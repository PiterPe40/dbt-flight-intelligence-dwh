version: "3.8"

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # OpenSky Network
    OPENSKY_USERNAME: ${OPENSKY_USERNAME:-}
    OPENSKY_PASSWORD: ${OPENSKY_PASSWORD:-}
    # BigQuery
    GCP_PROJECT_ID: ${GCP_PROJECT_ID:-flight-intelligence-dev}
    BQ_DATASET: ${BQ_DATASET:-flight_intelligence}
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/credentials/gcp-credentials.json
    # DuckDB fallback (local mode)
    USE_LOCAL_DB: ${USE_LOCAL_DB:-true}
    LOCAL_DB_PATH: /opt/airflow/data/flight_intelligence.duckdb
  volumes:
    - ./dags:/opt/airflow/dags
    - ./dbt_project:/opt/airflow/dbt_project
    - ./scripts:/opt/airflow/scripts
    - ./data:/opt/airflow/data
    - ./credentials:/opt/airflow/credentials
    - ./logs:/opt/airflow/logs
  depends_on:
    airflow-db:
      condition: service_healthy

services:
  # ──────────────────────────────────────────────
  # Airflow Metadata Database (PostgreSQL)
  # ──────────────────────────────────────────────
  airflow-db:
    image: postgres:16-alpine
    container_name: flight_airflow_db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Airflow Init (run migrations, create admin)
  # ──────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: flight_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username admin \
          --password admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@example.com || true
    restart: "no"

  # ──────────────────────────────────────────────
  # Airflow Webserver
  # ──────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: flight_airflow_webserver
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ──────────────────────────────────────────────
  # Airflow Scheduler
  # ──────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: flight_airflow_scheduler
    command: airflow scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ──────────────────────────────────────────────
  # Streamlit Dashboard
  # ──────────────────────────────────────────────
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flight_streamlit
    command: streamlit run streamlit_app/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    environment:
      USE_LOCAL_DB: "true"
      LOCAL_DB_PATH: /opt/airflow/data/flight_intelligence.duckdb
    volumes:
      - ./streamlit_app:/opt/airflow/streamlit_app
      - ./data:/opt/airflow/data
    restart: unless-stopped

volumes:
  airflow_db_data:
