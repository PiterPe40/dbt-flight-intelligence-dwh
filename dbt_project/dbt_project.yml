name: "flight_intelligence"
version: "1.0.0"
config-version: 2

profile: "flight_intelligence"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# ── Model configurations ────────────────────
models:
  flight_intelligence:
    staging:
      +materialized: view
      +schema: staging
      +tags: ["staging"]
    intermediate:
      +materialized: view
      +schema: intermediate
      +tags: ["intermediate"]
    marts:
      +materialized: table
      +schema: marts
      +tags: ["marts"]
    python:
      +materialized: table
      +schema: marts
      +tags: ["python", "marts"]

# ── Seed configurations ─────────────────────
seeds:
  flight_intelligence:
    +schema: seeds

# ── Variables ────────────────────────────────
vars:
  # Z-score threshold for military anomaly detection
  anomaly_zscore_threshold: 2.5
  # Rolling window for baseline calculation (days)
  baseline_window_days: 30
  # Minimum flights to consider for anomaly detection
  min_flights_threshold: 3
